- Locale: en-US
  Key: ReleaseNotes
  Value: |-
    This is a minor update whose two primary goals are to update Electron and Pandoc to the latest versions and fix an annoying bug we've introduced in 3.2.0.
    Do you enjoy Zettlr? Then consider donating to help pay for server and certificate costs. You can donate monthly on Patreon or once via PayPal. Thanks for your support!
    Many users have complained that automatically creating files was no longer possible in version 3.2 due to a change we made. Our hopes were to clean up the code, but we didn't anticipate this. Sorry for the inconvenience that this change has caused. It should now work as expected again.
    In addition, we've finally added a change that has been requested for quite some time: The app now remembers the widths of the sidebars across restarts, so you don't have to resize them manually anymore. To reset the widths to their default size, simply double-click the divider between them and the editor.
    Changelog
    GUI and Functionality
    - Zettlr now remembers the widths of file manager and sidebar
    - You can now reset the file manager and sidebar widths by double-clicking the corresponding resizer
    - Copying plain links in the form <http://www.example.com> will now remove the angled brackets (#5285)
    - Reverted a change from 3.1.0 which altered the process of creating new files in such a way that the "open directory" was no longer considered; now Zettlr will again use the open directory if present, allowing users to quickly create new files by selecting a folder first in the file manager (#5141)
    - Updated translations:
      - it-IT (#5233)
      - zh-TW (#5327)
      - nl-NL (#5319)
      - ru-RU (#5314)
    Under the Hood
    - Update Electron to v32.1.0
    - Update Pandoc to v3.4
    - Switched to ESLint v9.x, thereby replacing the "old" .eslintrc.json config with what ESLint calls "flat" configs
    - Bumped various dependencies
    New Contributors
    - @Yattatux made their first contribution in https://github.com/Zettlr/Zettlr/pull/5233
    - @camillem made their first contribution in https://github.com/Zettlr/Zettlr/pull/5237
    - @mansiyadav8 made their first contribution in https://github.com/Zettlr/Zettlr/pull/5285
    - @candelaere made their first contribution in https://github.com/Zettlr/Zettlr/pull/5319
    - @PeterDaveHello made their first contribution in https://github.com/Zettlr/Zettlr/pull/5327
    Full Changelog: https://github.com/Zettlr/Zettlr/compare/v3.2.0...v3.2.1
