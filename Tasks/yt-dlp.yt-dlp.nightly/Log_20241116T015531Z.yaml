    Changelog
    Core changes
    - Catch broken Cryptodome installations (#11486) by seproDev
    - utils
      - Fix join_nonempty, add **kwargs to unpack (#11559) by Grub4K
      - subs_list_to_dict: Add lang default parameter (#11508) by Grub4K
    Extractor changes
    - Allow ext override for thumbnails (#11545) by bashonly
    - adobepass: Fix provider requests (#11472) by bashonly
    - archive.org: Fix comments extraction (#11527) by jshumphrey
    - chaturbate: Support alternate domains (#10595) by manavchaudhary1
    - cloudflarestream: Avoid extraction via videodelivery.net (#11478) by hugovdev
    - facebook: Fix formats extraction (#11513) by bashonly
    - gamedevtv: Add extractor (#11368) by bashonly, stratus-ss
    - goplay: Fix extractor (#11466) by bashonly, SamDecrock
    - mixchmovie: Add extractor (#10897) by Sakura286
    - rutube: Rework extractors (#11480) by seproDev
    - soop: Fix thumbnail extraction (#11545) by bashonly
    - spreaker
      - Support episode pages and access keys (#11489) by julionc
      - Support podcast and feed pages (#10968) by subrat-lima
    Misc. changes
    - build
      - Bump PyInstaller version pin to >=6.11.1 (#11507) by bashonly
      - Enable attestations for trusted publishing (#11420) by bashonly
      - Pin websockets version to >=13.0,<14 (#11488) by bashonly
