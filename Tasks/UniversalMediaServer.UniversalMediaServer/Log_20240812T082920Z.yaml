  Key: ReleaseNotes
  Value: |-
    Summary

    This release adds season names to folders, improves support for Samsung and Sony TVs, improves scanning speed, and more!
    Changes
    General
    - Added season names to folders
    - Improved folder scanning speed (#4778)
    - Made new Media Server engine (Jetty+) the default
    - Fixed video player not fitting in browser window (#4832)
    - Fixed folder sorting (#4814) (thanks, @MandyD-coder!)
    - Added automatic launch instructions for web settings in VS Code
    Media players
    - Added renderer config for Sony Bravia XR series TVs
    - Added fallback renderer config for Sony Bravia TVs
    - Improved support for and detection of Samsung TVs including 2024 models
    Translation updates via Crowdin
    - Hungarian (50%) (thanks, LZsolt75!)
    Dependencies
    - Bump @mantine/core from 7.10.2 to 7.11.2 (#4818)
    - Bump @mantine/dropzone from 7.10.2 to 7.11.2 (#4818)
    - Bump @mantine/form from 7.10.2 to 7.11.2 (#4818)
    - Bump @mantine/hooks from 7.10.2 to 7.11.2 (#4818)
    - Bump @mantine/modals from 7.10.2 to 7.11.2 (#4818)
    - Bump @mantine/notifications from 7.10.2 to 7.11.2 (#4818)
    - Bump commons-logging:commons-logging from 1.3.2 to 1.3.3 (#4799)
    - Bump eslint-plugin-react-refresh from 0.4.7 to 0.4.8 (#4817)
    - Bump org.apache.maven.plugins:maven-surefire-plugin from 3.3.0 to 3.3.1 (#4816)
    - Bump video.js from 8.16.0 to 8.16.1 (#4794)
    - Bump youtube-dl from 2021.12.17 to 2024.07.11
